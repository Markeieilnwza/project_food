<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodShare - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo_main">
                <img src="imageforSE/logo.avif" alt="FoodShare Logo">
                <h1>FoodShare</h1>
            </div>
            <nav>
                <a href="https://www.google.com/maps" target="_blank">Groceries Near Me</a>
                <a href="support.html">Contact</a>
                <a href="#" id="pendingLink" onclick="viewPendingRecipes(); return false;">Pending (<span id="pendingCount">0</span>)</a>
                <span id="userInfo" style="color: #333; display: none;"></span>
                <button id="logoutBtn" class="nav-btn nav-link-btn logout-link-btn" style="display: none;">Logout</button>
                <a id="loginLink" href="login.html">Sign In</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="heroMain">
        <h2>🛡️ Admin Panel</h2>
        <p>Manage recipes and moderate user submissions</p>
    </section>

    <!-- Pending Detail Section -->
    <section class="hero" id="heroPending" style="display: none; background: #f59e0b;">
        <h2>⏳ Pending Recipes Review</h2>
        <p>Review and approve recipes waiting for moderation</p>
        <button onclick="backToMain()" style="margin-top: 15px; background: white; color: #f59e0b; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">← Back to Overview</button>
    </section>

    <!-- Admin Content -->
    <div class="recipes-container" id="mainView">
        <div class="results-info">
            <span id="recipeCount">Loading recipes...</span>
        </div>

        <div class="admin-search-box" style="margin-bottom: 30px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="searchInput" placeholder="Search recipe by name..." style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                <button onclick="searchRecipes()" style="background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold;">Search</button>
                <button onclick="loadAllRecipes()" style="background: #6b7280; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold;">Show All</button>
            </div>
            <div id="message" style="padding: 12px; border-radius: 6px; display: none; margin-bottom: 15px;"></div>
        </div>

        <!-- Approved Recipes Section -->
        <div>
            <h2 style="margin-bottom: 20px; color: #10b981; border-bottom: 2px solid #10b981; padding-bottom: 10px;">✅ Approved Recipes</h2>
            <div class="recipes-grid" id="approvedRecipes"></div>
        </div>
    </div>

    <!-- Pending View -->
    <div class="recipes-container" id="pendingView" style="display: none;">
        <div id="messagePending" style="padding: 12px; border-radius: 6px; display: none; margin-bottom: 15px;"></div>
        <div class="recipes-grid" id="pendingRecipesList"></div>
    </div>

    <script>
        const API_URL = window.location.protocol === 'file:'
            ? 'http://localhost:3000/api'
            : '/api';
        let allRecipes = [];

        // Check if admin
        window.onload = () => {
            const role = localStorage.getItem('role');
            const username = localStorage.getItem('username');
            
            if (role !== 'admin') {
                alert('Access denied. Admin only.');
                window.location.href = 'main.html';
                return;
            }

            if (username) {
                document.getElementById('userInfo').style.display = 'inline';
                document.getElementById('userInfo').textContent = `👤 ${username} (Admin)`;
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('loginLink').style.display = 'none';
            }

            loadAllRecipes();
        };

        function viewPendingRecipes() {
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('pendingView').style.display = 'block';
            document.getElementById('heroMain').style.display = 'none';
            document.getElementById('heroPending').style.display = 'block';

            const pendingRecipes = allRecipes.filter(r => r.status !== 'approved');
            displayPendingRecipes(pendingRecipes);
        }

        function backToMain() {
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('pendingView').style.display = 'none';
            document.getElementById('heroMain').style.display = 'block';
            document.getElementById('heroPending').style.display = 'none';
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.display = 'block';
            msg.style.background = type === 'success' ? '#d1fae5' : '#fee2e2';
            msg.style.color = type === 'success' ? '#065f46' : '#991b1b';
            msg.style.border = type === 'success' ? '1px solid #6ee7b7' : '1px solid #fca5a5';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function showMessagePending(text, type) {
            const msg = document.getElementById('messagePending');
            msg.textContent = text;
            msg.style.display = 'block';
            msg.style.background = type === 'success' ? '#d1fae5' : '#fee2e2';
            msg.style.color = type === 'success' ? '#065f46' : '#991b1b';
            msg.style.border = type === 'success' ? '1px solid #6ee7b7' : '1px solid #fca5a5';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function searchRecipes() {
            const query = document.getElementById('searchInput').value.trim();
            const token = localStorage.getItem('token');
            if (!query) {
                showMessage('Please enter a recipe name', 'error');
                return;
            }

            fetch(`${API_URL}/admin/search-recipes?query=${encodeURIComponent(query)}`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
                .then(r => {
                    if (!r.ok) throw new Error('Search failed');
                    return r.json();
                })
                .then(recipes => {
                    allRecipes = recipes;
                    if (recipes.length === 0) {
                        document.getElementById('approvedRecipes').innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px; color: #666;">No recipes found</div>';
                        return;
                    }
                    displayRecipes(recipes);
                })
                .catch(err => {
                    console.error('Error:', err);
                    showMessage('Search failed', 'error');
                });
        }

        function loadAllRecipes() {
            const token = localStorage.getItem('token');

            fetch(`${API_URL}/admin/recipes`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
                .then(r => {
                    if (!r.ok) throw new Error('Failed to load recipes');
                    return r.json();
                })
                .then(recipes => {
                    allRecipes = recipes;
                    if (recipes.length === 0) {
                        document.getElementById('approvedRecipes').innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px; color: #666;">No recipes found</div>';
                        document.getElementById('recipeCount').textContent = 'Showing 0 recipes';
                        return;
                    }
                    
                    // Update pending count
                    const pendingCount = recipes.filter(r => r.status !== 'approved').length;
                    document.getElementById('pendingCount').textContent = pendingCount;
                    
                    displayRecipes(recipes);
                    document.getElementById('recipeCount').textContent = `Showing ${recipes.length} recipes`;
                })
                .catch(err => {
                    console.error('Error:', err);
                    showMessage('Failed to load recipes', 'error');
                });
        }

        function displayRecipes(recipes) {
            const approvedRecipes = recipes.filter(r => r.status === 'approved');

            // Function to build recipe card HTML
            const buildCard = (recipe) => {
                const statusColor = recipe.status === 'approved' ? '#10b981' : recipe.status === 'pending' ? '#f59e0b' : '#ef4444';
                const statusText = recipe.status ? recipe.status.toUpperCase() : 'PENDING';
                return `
                <div class="recipe-card" data-recipe-id="${recipe.id}">
                    <div class="recipe-card-image-container">
                        <img src="${recipe.image || 'https://via.placeholder.com/350x250'}" alt="${recipe.name}" class="recipe-card-image" onerror="this.src='https://via.placeholder.com/350x250'">
                        <span class="recipe-difficulty-badge">${recipe.difficulty || 'Medium'}</span>
                        <span class="recipe-status-badge" style="background: ${statusColor}; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; position: absolute; bottom: 8px; left: 8px;">${statusText}</span>
                    </div>
                    <div class="recipe-card-body">
                        <h3 class="recipe-card-title">${recipe.name}</h3>
                        <p class="recipe-card-creator">by ${recipe.creatorName || recipe.createdBy || 'Unknown'}</p>
                        <div class="recipe-card-footer">
                            <span class="recipe-card-meta">⏱ ${recipe.cookingTime || '?'} min</span>
                            <span class="recipe-card-meta">👥 ${recipe.servings || '2'}</span>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="recipe-card-view-btn" onclick="deleteRecipe('${recipe.id}')" style="background: #ef4444; color: white; flex: 1;">🗑️ Delete</button>
                    </div>
                </div>
            `;
            };

            // Display approved recipes
            const approvedHtml = approvedRecipes.length > 0
                ? approvedRecipes.map(buildCard).join('')
                : '<div style="text-align: center; grid-column: 1/-1; padding: 40px; color: #666;">No approved recipes</div>';
            document.getElementById('approvedRecipes').innerHTML = approvedHtml;
        }

        function displayPendingRecipes(recipes) {
            const buildCard = (recipe) => {
                return `
                <div class="recipe-card" data-recipe-id="${recipe.id}">
                    <div class="recipe-card-image-container">
                        <img src="${recipe.image || 'https://via.placeholder.com/350x250'}" alt="${recipe.name}" class="recipe-card-image" onerror="this.src='https://via.placeholder.com/350x250'">
                        <span class="recipe-difficulty-badge">${recipe.difficulty || 'Medium'}</span>
                    </div>
                    <div class="recipe-card-body">
                        <h3 class="recipe-card-title">${recipe.name}</h3>
                        <p class="recipe-card-creator">by ${recipe.creatorName || recipe.createdBy || 'Unknown'}</p>
                        <div class="recipe-card-footer">
                            <span class="recipe-card-meta">⏱ ${recipe.cookingTime || '?'} min</span>
                            <span class="recipe-card-meta">👥 ${recipe.servings || '2'}</span>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="recipe-card-view-btn" onclick="approveRecipe('${recipe.id}')" style="background: #10b981; color: white; flex: 1;">✅ Approve</button>
                        <button class="recipe-card-view-btn" onclick="deleteRecipe('${recipe.id}')" style="background: #ef4444; color: white; flex: 1;">🗑️ Delete</button>
                    </div>
                </div>
            `;
            };

            if (recipes.length === 0) {
                document.getElementById('pendingRecipesList').innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px; color: #666;">No pending recipes</div>';
                return;
            }

            document.getElementById('pendingRecipesList').innerHTML = recipes.map(buildCard).join('');
        }

        function deleteRecipe(recipeId) {
            if (!confirm('Are you sure? This cannot be undone.')) return;

            const token = localStorage.getItem('token');

            fetch(`${API_URL}/admin/recipes/${recipeId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
                .then(r => {
                    if (!r.ok) throw new Error('Delete failed');
                    return r.json();
                })
                .then(data => {
                    showMessage('✅ Recipe deleted successfully', 'success');
                    showMessagePending('✅ Recipe deleted successfully', 'success');
                    loadAllRecipes();
                })
                .catch(err => {
                    console.error('Error:', err);
                    showMessage('❌ Failed to delete recipe', 'error');
                    showMessagePending('❌ Failed to delete recipe', 'error');
                });
        }

        function approveRecipe(recipeId) {
            const token = localStorage.getItem('token');

            fetch(`${API_URL}/admin/recipes/${recipeId}/approve`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
                .then(r => {
                    if (!r.ok) throw new Error('Approve failed');
                    return r.json();
                })
                .then(data => {
                    showMessagePending('✅ Recipe approved successfully', 'success');
                    loadAllRecipes();
                    viewPendingRecipes();
                })
                .catch(err => {
                    console.error('Error:', err);
                    showMessagePending('❌ Failed to approve recipe', 'error');
                });
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'main.html';
        });
    </script>
</body>
</html>
